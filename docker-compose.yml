version: '3.8'

services:
  app:
    build: . # 使用当前目录下的 Dockerfile 来构建这个服务的镜像
    container_name: seckill-app
    ports:
      - "8080:8080" # 将电脑的 8080 端口映射到容器的 8080 端口
    depends_on: # 先启动三个服务
      - mysql
      - redis
      - rabbitmq
    networks: # 把 app 放到 seckill-net 网络里
      - seckill-net
    deploy:
      resources:
        limits:
          cpus: '1.0'      # 最多使用1个CPU核心
          memory: '512M'   # 最多使用512MB内存
        reservations:
          cpus: '0.5'      # 保证至少有0.5个CPU核心可用
          memory: '256M'   # 保证至少有256MB内存可用

  # MySQL 数据库服务
  mysql:
    image: mysql:8.0.45-bookworm
    container_name: mysql-server
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: "fzfz1314"
      MYSQL_DATABASE: "go_seckill_system"
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql # 数据库数据持久化，防止容器删除后数据丢失
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql # 启动时自动执行这个 SQL 文件来建表
    networks:
      - seckill-net

  # Redis 缓存服务
  redis:
    image: redis:8.6
    container_name: redis-cache
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data # 持久化 Redis 数据
    networks:
      - seckill-net

  # RabbitMQ 消息队列服务
  rabbitmq:
    image: rabbitmq:management
    container_name: rabbitmq-server
    restart: always
    ports:
      - "5672:5672"   # 给 Go 程序连接用
      - "15672:15672" # 暴露管理后台的端口，浏览器访问 http://localhost:15672 就能看到
    environment:
      RABBITMQ_DEFAULT_USER: "guest"
      RABBITMQ_DEFAULT_PASS: "guest"
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq # 持久化 MQ 数据
    networks:
      - seckill-net

# 自定义网络，让所有服务都在一个局域网里
networks:
  seckill-net:
    driver: bridge

# 定义数据卷
volumes:
  mysql-data:
  redis-data:
  rabbitmq-data: